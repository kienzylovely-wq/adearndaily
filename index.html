<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AdEarnDaily</title>
  
  <script src="//libtl.com/sdk.js" data-zone="10865188" data-sdk="show_10865188" async></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      margin: 0; padding: 0; font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #1a0033);
      color: white; text-align: center; min-height: 100vh;
    }
    .header { padding: 40px 15px 15px; }
    .logo { font-size: 36px; font-weight: 700; }
    .balance { font-size: 56px; font-weight: 700; margin: 20px 0 8px; }
    .ton { color: #00ffaa; }
    button {
      background: linear-gradient(90deg, #00ffaa, #00cc88);
      color: black;
      font-size: 17px;
      font-weight: 700;
      padding: 18px 30px;
      border: none;
      border-radius: 50px;
      margin: 12px 10px;
      width: 85%;
      box-shadow: 0 8px 25px rgba(0,255,170,0.4);
    }
    .withdraw-btn { background: linear-gradient(90deg, #ffaa00, #ff8800); color: white; }
    .info { font-size: 14px; opacity: 0.8; margin: 25px 20px; line-height: 1.5; }
    .history {
      margin: 30px 15px;
      text-align: left;
    }
    .tx-item {
      background: rgba(255,255,255,0.06);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🪙 AdEarnDaily</div>
    <p>Watch Ads • Earn TON</p>
  </div>

  <div class="balance" id="balance">0.00 <span class="ton">TON</span></div>
  <p style="margin-top:-10px; opacity:0.7;">Your Balance</p>

  <button onclick="watchInterstitial()">🎥 REWARDED INTERSTITIAL<br><small>+0.03 TON</small></button>
  <button onclick="watchPopup()">🔥 REWARDED POPUP<br><small>+0.06 TON</small></button>
  <button onclick="showInAppInterstitial()">📢 IN-APP INTERSTITIAL<br><small>Auto Show</small></button>
  <button onclick="withdrawTON()" class="withdraw-btn">💸 WITHDRAW TON</button>

  <div class="history">
    <h3>Transaction History</h3>
    <div id="historyList">No transactions yet</div>
  </div>

  <div class="info">
    Minimum withdrawal: 1 TON (Fee 10%)
  </div>

  <script>
    let balance = parseFloat(localStorage.getItem('tonBalance')) || 0;
    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    document.getElementById('balance').innerHTML = balance.toFixed(2) + ' <span class="ton">TON</span>';
    renderHistory();

    function saveData() {
      localStorage.setItem('tonBalance', balance);
      localStorage.setItem('transactions', JSON.stringify(transactions));
      document.getElementById('balance').innerHTML = balance.toFixed(2) + ' <span class="ton">TON</span>';
      renderHistory();
    }

    function addTransaction(type, amount, note = "") {
      const tx = {
        date: new Date().toLocaleString('id-ID'),
        type: type,
        amount: amount,
        note: note
      };
      transactions.unshift(tx);
      if (transactions.length > 15) transactions.pop();
      saveData();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (transactions.length === 0) {
        list.innerHTML = '<p style="opacity:0.6; text-align:center;">No transactions yet</p>';
        return;
      }
      let html = '';
      transactions.forEach(tx => {
        const color = tx.amount > 0 ? '#00ff88' : '#ff6666';
        html += `
          <div class="tx-item">
            <div style="display:flex;justify-content:space-between;">
              <span>${tx.type}</span>
              <span style="color:\( {color}"> \){tx.amount > 0 ? '+' : ''}${tx.amount} TON</span>
            </div>
            <small style="opacity:0.7;">${tx.date}</small>
            \( {tx.note ? `<small style="opacity:0.7;"> \){tx.note}</small>` : ''}
          </div>`;
      });
      list.innerHTML = html;
    }

    function checkSDK() {
      if (typeof show_10865188 === 'undefined') {
        alert("Monetag SDK is still loading...\nPlease wait 3-5 seconds and try again.");
        return false;
      }
      return true;
    }

    function watchInterstitial() {
      if (!checkSDK()) return;
      show_10865188({
        type: 'rewardedInterstitial',
        onReward: () => {
          balance += 0.03;
          saveData();
          addTransaction('Ad Reward', 0.03, 'Rewarded Interstitial');
          alert('✅ +0.03 TON added successfully!');
        }
      });
    }

    function watchPopup() {
      if (!checkSDK()) return;
      show_10865188('pop').then(() => {
        balance += 0.06;
        saveData();
        addTransaction('Ad Reward', 0.06, 'Rewarded Popup');
        alert('🔥 +0.06 TON added successfully!');
      }).catch(() => alert('Failed to load ad. Try again.'));
    }

    function showInAppInterstitial() {
      if (typeof show_10865188 !== 'undefined') {
        show_10865188({
          type: 'inApp',
          inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }
        });
      }
    }

    // Withdraw dengan fitur Paste Address
    async function withdrawTON() {
      if (balance < 1) {
        alert('❌ Minimum withdrawal is 1 TON');
        return;
      }

      // Form Withdraw yang lebih baik
      let address = prompt('Enter TON Wallet Address:', '');

      if (!address) return;

      // Fitur Paste Address
      if (address === "") {
        if (navigator.clipboard) {
          try {
            address = await navigator.clipboard.readText();
            if (!address) address = prompt('Enter TON Wallet Address:', '');
          } catch (e) {
            address = prompt('Enter TON Wallet Address:', '');
          }
        }
      }

      if (!address || address.length < 10) {
        alert('❌ Invalid wallet address');
        return;
      }

      let amount = parseFloat(prompt('Enter amount to withdraw (min 1 TON):', balance.toFixed(2)));
      if (amount < 1 || amount > balance) {
        alert('❌ Invalid amount');
        return;
      }

      const fee = Math.max(amount * 0.10, 0.1);
      const total = amount + fee;

      if (confirm(`Withdrawal Summary:\n\nAmount : ${amount.toFixed(2)} TON\nFee (10%) : ${fee.toFixed(2)} TON\nTotal deducted : ${total.toFixed(2)} TON\n\nTo : ${address}\n\nConfirm?`)) {
        balance -= total;
        saveData();
        addTransaction('Withdrawal', -amount, `To ${address.substring(0,8)}...`);
        alert(`✅ Withdrawal request submitted!\n\nAmount: ${amount.toFixed(2)} TON\nFee: ${fee.toFixed(2)} TON\n\nWill be processed in 1-24 hours.`);
      }
    }

    // Auto show in-app
    setTimeout(showInAppInterstitial, 4000);
  </script>
</body>
</html>

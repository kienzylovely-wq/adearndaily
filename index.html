<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AdEarnDaily</title>
  
  <script src="//libtl.com/sdk.js" data-zone="10865188" data-sdk="show_10865188" async></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      margin: 0; padding: 0; font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #1a0033);
      color: white; text-align: center; min-height: 100vh;
    }
    .header { padding: 40px 15px 15px; }
    .logo { font-size: 38px; font-weight: 700; text-shadow: 0 4px 10px rgba(0,255,170,0.3); }
    .balance { font-size: 58px; font-weight: 700; margin: 20px 0 8px; text-shadow: 0 4px 15px rgba(0,255,170,0.4); }
    .ton { color: #00ffaa; }

    .task-container { padding: 15px; }
    .task-card {
      background: #1f1f2e;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5),
                  0 4px 10px rgba(0,255,170,0.2);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .task-card:active {
      transform: scale(0.94);
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .task-icon {
      font-size: 42px;
      filter: drop-shadow(0 6px 10px rgba(0,255,170,0.4));
      transition: transform 0.3s ease;
    }
    .task-card:active .task-icon {
      transform: scale(1.3);
    }
    .task-info { flex: 1; text-align: left; }
    .task-info h3 { 
      margin: 0; 
      font-size: 18px; 
    }
    .claim-btn {
      background: linear-gradient(90deg, #00ffaa, #00dd99);
      color: black;
      border: none;
      padding: 12px 26px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 6px 15px rgba(0,255,170,0.4);
      transition: all 0.2s ease;
    }
    .task-card:active .claim-btn {
      transform: scale(0.92);
    }
    .info { font-size: 14px; opacity: 0.8; margin: 25px 20px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🪙 AdEarnDaily</div>
    <div class="balance" id="balance">0.00 <span class="ton">TON</span></div>
  </div>

  <div class="task-container">
    <div class="task-card" onclick="watchInterstitial()">
      <div class="task-icon">🎥</div>
      <div class="task-info">
        <h3>Watch Now Earn TON 0.03</h3>
      </div>
      <button class="claim-btn">Claim</button>
    </div>

    <div class="task-card" onclick="watchPopup()">
      <div class="task-icon">🔥</div>
      <div class="task-info">
        <h3>Watch Now Earn TON 0.06</h3>
      </div>
      <button class="claim-btn">Claim</button>
    </div>

    <div class="task-card" onclick="showInAppInterstitial()">
      <div class="task-icon">📺</div>
      <div class="task-info">
        <h3>Watch Now Earn TON 0.02</h3>
      </div>
      <button class="claim-btn">Claim</button>
    </div>
  </div>

  <button onclick="withdrawTON()" class="withdraw-btn" style="margin: 20px 15px; width: calc(100% - 30px);">💸 WITHDRAW TON</button>

  <div class="info">
    Minimum withdrawal: 1 TON (Fee 10%)
  </div>

  <script>
    let balance = parseFloat(localStorage.getItem('tonBalance')) || 0;
    document.getElementById('balance').innerHTML = balance.toFixed(2) + ' <span class="ton">TON</span>';

    function saveBalance() {
      localStorage.setItem('tonBalance', balance);
      document.getElementById('balance').innerHTML = balance.toFixed(2) + ' <span class="ton">TON</span>';
    }

    function checkSDK() {
      if (typeof show_10865188 === 'undefined') {
        alert("SDK masih loading...\nTunggu sebentar dan coba lagi.");
        return false;
      }
      return true;
    }

    function watchInterstitial() {
      if (!checkSDK()) return;
      show_10865188({
        type: 'rewardedInterstitial',
        onReward: () => {
          balance += 0.03;
          saveBalance();
          alert('✅ +0.03 TON berhasil ditambahkan!');
        }
      });
    }

    function watchPopup() {
      if (!checkSDK()) return;
      show_10865188('pop').then(() => {
        balance += 0.06;
        saveBalance();
        alert('🔥 +0.06 TON berhasil ditambahkan!');
      }).catch(() => alert('Gagal memuat iklan. Coba lagi.'));
    }

    function showInAppInterstitial() {
      if (typeof show_10865188 !== 'undefined') {
        show_10865188({
          type: 'inApp',
          inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }
        });
      }
    }

    function withdrawTON() {
      if (balance < 1) {
        alert('❌ Minimum withdrawal adalah 1 TON');
        return;
      }
      alert('💸 Fitur withdraw sedang dalam pengembangan.');
    }
  </script>
</body>
</html>
